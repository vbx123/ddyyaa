<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسائل المودة</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .message-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .message-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background-color: var(--accent-color);
            padding: 12px 20px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .card-header::before {
            content: "👤";
            margin-left: 10px;
        }

        .card-body {
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap; /* للحفاظ على المسافات والسطور الجديدة */
        }

        /* الجزء الجديد لعرض التاريخ والوقت */
        .card-footer {
            padding: 10px 20px;
            background-color: #fafafa;
            border-top: 1px dashed #e2e8f0;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
        }

        .meta-item::before {
            margin-left: 5px;
        }

        .date-icon::before { content: "📅"; }
        .time-icon::before { content: "🕒"; }

        #loading {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container" id="messages-container">
        <div id="loading">جاري تحميل الرسائل...</div>
    </div>

    <script>
        async function loadMessages() {
            const container = document.getElementById('messages-container');
            
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                container.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'message-card';

                    // معالجة البيانات في حال عدم وجود تاريخ أو وقت لبعض الرسائل القديمة
                    const dateStr = item.date || "غير محدد";
                    const timeStr = item.time || "غير محدد";

                    card.innerHTML = `
                        <div class="card-header">إلى: ${item.recipient}</div>
                        <div class="card-body">${item.message}</div>
                        <div class="card-footer">
                            <span class="meta-item date-icon">${dateStr}</span>
                            <span class="meta-item time-icon">${timeStr}</span>
                        </div>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading JSON:', error);
                container.innerHTML = '<div style="color:red; text-align:center;">عذراً، فشل تحميل البيانات. تأكد من وجود ملف data.json</div>';
            }
        }

        window.onload = loadMessages;
    </script>
</body>
</html>
