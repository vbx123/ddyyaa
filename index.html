<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسائل خاصة ومؤمنة</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --locked-bg: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 600px; }

        /* ترويسة العد التنازلي */
        .countdown-header {
            background: #1e293b; color: white;
            padding: 15px; border-radius: 10px;
            margin-bottom: 25px; text-align: center; width: 100%;
        }

        .message-card {
            background: var(--card-bg);
            border-radius: 12px; margin-bottom: 20px;
            border: 1px solid #cbd5e1; overflow: hidden;
            transition: 0.3s;
        }

        .card-header {
            background-color: #f8fafc; padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--primary-color); font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }

        .card-body { padding: 20px; display: none; /* مخفي افتراضياً */ }

        .lock-screen {
            padding: 30px; text-align: center;
            background: #f8fafc;
        }

        input[type="password"] {
            padding: 8px; border-radius: 5px; border: 1px solid #cbd5e1;
            width: 60%; margin-bottom: 10px; outline: none;
        }

        button {
            padding: 8px 20px; background: var(--primary-color);
            color: white; border: none; border-radius: 5px; cursor: pointer;
        }

        button:hover { opacity: 0.9; }

        .revealed .card-body { display: block; white-space: pre-wrap; }
        .revealed .lock-screen { display: none; }
    </style>
</head>
<body>

    <div class="countdown-header" id="countdown-box">
        الوقت المتبقي لفتح جميع الرسائل تلقائياً: <span id="timer">-- : -- : --</span>
    </div>

    <div class="container" id="messages-container">
        <div id="loading" style="text-align:center;">جاري التحميل...</div>
    </div>

    <script>
        // التاريخ المحدد لفتح كل الرسائل تلقائياً
        const unlockDate = new Date("June 1, 2026 00:00:00").getTime();
        let isGlobalUnlock = false;

        async function loadMessages() {
            const container = document.getElementById('messages-container');
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                container.innerHTML = '';

                // تحديث العد التنازلي
                const timerInterval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = unlockDate - now;

                    if (distance < 0) {
                        clearInterval(timerInterval);
                        document.getElementById('timer').innerText = "تم فتح جميع الرسائل";
                        isGlobalUnlock = true;
                        document.querySelectorAll('.message-card').forEach(card => card.classList.add('revealed'));
                    } else {
                        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                        document.getElementById('timer').innerText = `${days} يوم و ${hours}:${minutes}:${seconds}`;
                    }
                }, 1000);

                // إنشاء الكروت
                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.id = `card-${index}`;

                    card.innerHTML = `
                        <div class="card-header">إلى: ${item.recipient} <span>🔒</span></div>
                        <div class="lock-screen" id="lock-${index}">
                            <p style="font-size:0.9rem; color:#64748b;">هذه الرسالة محمية بكلمة سر</p>
                            <input type="password" id="pass-${index}" placeholder="أدخل كلمة السر">
                            <br>
                            <button onclick="checkPass(${index}, '${item.password}')">فتح الرسالة</button>
                        </div>
                        <div class="card-body">${item.message}</div>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = '<div style="color:red;">خطأ في تحميل ملف JSON</div>';
            }
        }

        function checkPass(index, correctPass) {
            const input = document.getElementById(`pass-${index}`).value;
            if (input === correctPass) {
                document.getElementById(`card-${index}`).classList.add('revealed');
            } else {
                alert("كلمة السر غير صحيحة");
            }
        }

        window.onload = loadMessages;
    </script>
</body>
</html>
