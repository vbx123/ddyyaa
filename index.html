<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الرسائل الاحترافي</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* تصميم صندوق الرسالة */
        .message-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .message-card:hover {
            transform: translateY(-2px);
        }

        /* الجزء العلوي (اسم الشخص) */
        .card-header {
            background-color: #f1f5f9;
            padding: 10px 20px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .card-header::before {
            content: "👤";
            margin-left: 8px;
        }

        /* الجزء السفلي (محتوى الرسالة) */
        .card-body {
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* رسالة التحميل */
        #loading {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container" id="messages-container">
        <div id="loading">جاري تحميل الرسائل...</div>
    </div>

    <script>
        async function loadMessages() {
            const container = document.getElementById('messages-container');
            
            try {
                // جلب البيانات من ملف JSON
                const response = await fetch('data.json');
                const data = await response.json();
                
                // مسح رسالة التحميل
                container.innerHTML = '';

                // إنشاء الصناديق بناءً على البيانات
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'message-card';

                    card.innerHTML = `
                        <div class="card-header">إلى: ${item.recipient}</div>
                        <div class="card-body">${item.message}</div>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading JSON:', error);
                container.innerHTML = '<div style="color:red; text-align:center;">عذراً، فشل تحميل البيانات. تأكد من وجود ملف data.json</div>';
            }
        }

        // تشغيل الدالة عند تحميل الصفحة
        window.onload = loadMessages;
    </script>
</body>
</html>
